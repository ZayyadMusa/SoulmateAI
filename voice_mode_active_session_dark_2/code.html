<!DOCTYPE html>

<html class="dark" lang="en"><head>

                "on-primary-container": "#003260",
                "on-error": "#690005",

                "on-tertiary": "#00315d",
                "primary-fixed-dim": "#a4c9ff",
                "error": "#ffb4ab",
                "on-secondary-container": "#a4b7cd",
                "secondary-container": "#36485b",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .soul-orb-glow {
            filter: blur(50px);
            animation: pulse-glow 6s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        .morphing-orb {
            animation: morph 8s infinite ease-in-out;
        }

        @keyframes morph {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
        }

        .waveform-bar {
            animation: wave-bounce 1.5s infinite ease-in-out;
            box-shadow: 0 0 8px rgba(164, 201, 255, 0.3);
        }

        @keyframes wave-bounce {
            0%, 100% { height: 4px; }
            50% { height: 20px; }
        }

        .fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bg-mesh {
            background: radial-gradient(circle at 20% 30%, rgba(93, 156, 236, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(88, 156, 239, 0.1) 0%, transparent 50%),
                        #131313;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden flex flex-col items-center justify-between">
<!-- Background Atmospheric Layer -->
<div class="fixed inset-0 bg-mesh pointer-events-none -z-10"></div>
<!-- Top App Bar -->
<header class="w-full top-0 sticky bg-surface/60 backdrop-blur-xl flex items-center justify-between px-margin-mobile py-lg z-50">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined text-[20px]" data-icon="waving_hand">waving_hand</span>
</div>
<div>
<h1 class="font-headline-lg-mobile text-[20px] leading-tight text-primary font-bold">Soulmate AI</h1>
<p class="text-label-md text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]" data-icon="spatial_audio_off" style="font-variation-settings: 'FILL' 1;">spatial_audio_off</span>
                    Hands-free Active
                </p>
</div>
</div>
<button class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Visual Content -->
<main class="flex-1 w-full flex flex-col items-center justify-center px-margin-mobile relative overflow-hidden">
<!-- Animated Soul Orb -->
<div class="relative w-72 h-72 flex items-center justify-center mb-xl">
<!-- Glow layers -->
<div class="absolute w-full h-full bg-primary-container/30 rounded-full soul-orb-glow"></div>
<div class="absolute w-4/5 h-4/5 bg-tertiary-container/20 rounded-full soul-orb-glow" style="animation-delay: -2s;"></div>
<!-- Core Morphing Orb -->
<div class="relative w-48 h-48 bg-gradient-to-br from-primary via-primary-container to-tertiary-container morphing-orb shadow-2xl flex items-center justify-center">
<div class="w-40 h-40 bg-white/10 backdrop-blur-sm morphing-orb" style="animation-duration: 10s;"></div>
</div>
</div>
<!-- Dynamic Transcription -->
<div class="max-w-md text-center px-sm fade-in-up">
<p class="font-headline-lg-mobile text-on-surface leading-tight font-medium">
                "I'm listening. Tell me more about that walk in the park..."
            </p>
<p class="mt-md font-body-md text-on-surface-variant/80">
                AI is thinking and listening
            </p>
</div>
</main>
<!-- Bottom Controls & Visualization -->
<footer class="w-full px-margin-mobile pb-xl pt-lg flex flex-col items-center gap-lg relative z-50">
<!-- Waveform Visualization -->
<div class="flex items-end justify-center gap-xs h-8">
<div class="waveform-bar w-1.5 bg-primary rounded-full" style="animation-delay: 0.1s; height: 12px;"></div>
<div class="waveform-bar w-1.5 bg-primary-container rounded-full" style="animation-delay: 0.3s; height: 18px;"></div>
<div class="waveform-bar w-1.5 bg-primary rounded-full" style="animation-delay: 0.2s; height: 24px;"></div>
<div class="waveform-bar w-1.5 bg-tertiary-container rounded-full" style="animation-delay: 0.5s; height: 14px;"></div>
<div class="waveform-bar w-1.5 bg-primary rounded-full" style="animation-delay: 0.4s; height: 20px;"></div>
<div class="waveform-bar w-1.5 bg-primary-container rounded-full" style="animation-delay: 0.6s; height: 16px;"></div>
<div class="waveform-bar w-1.5 bg-tertiary-container rounded-full" style="animation-delay: 0.2s; height: 10px;"></div>
</div>
<!-- Action Buttons -->
<div class="flex items-center gap-lg">
<button class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant hover:text-on-surface active:scale-95 transition-all">
<span class="material-symbols-outlined text-[28px]" data-icon="mic_off">mic_off</span>
</button>
<button class="px-xl py-5 rounded-full bg-error-container text-on-error-container font-headline-lg-mobile text-[18px] flex items-center gap-md shadow-lg active:scale-95 transition-all hover:brightness-110">
<span class="material-symbols-outlined" data-icon="call_end" style="font-variation-settings: 'FILL' 1;">call_end</span>
                End Session
            </button>
<button class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant hover:text-on-surface active:scale-95 transition-all">
<span class="material-symbols-outlined text-[28px]" data-icon="volume_up">volume_up</span>
</button>
</div>
<!-- Mode Indicator -->
<div class="flex items-center gap-sm px-lg py-sm bg-surface-container-high rounded-full border border-outline-variant/30">
<div class="w-2 h-2 bg-primary rounded-full animate-pulse shadow-[0_0_8px_rgba(164,201,255,0.6)]"></div>
<span class="font-label-md text-on-surface-variant">Walk &amp; Talk Mode</span>
</div>
</footer>
<!-- Interactive Layer Script -->
<script>
        const orb = document.querySelector('.morphing-orb');
        const waveformBars = document.querySelectorAll('.waveform-bar');

        function simulateVoiceActivity() {
            // Randomly scale the orb to simulate 'hearing' input
            const scale = 1 + (Math.random() * 0.08);
            orb.style.transform = `scale(${scale})`;
            
            // Randomize waveform heights
            waveformBars.forEach(bar => {
                const height = Math.floor(Math.random() * 22) + 6;
                bar.style.height = `${height}px`;
            });

            setTimeout(simulateVoiceActivity, 150);
        }

        // Start animation
        simulateVoiceActivity();

        // Prevent standard long-press behaviors
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body></html>
